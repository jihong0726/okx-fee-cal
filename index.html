<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欧易计算器 V7.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f5f5f5; color: #1e2329; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .panel-bg { background-color: #ffffff; border: 1px solid #eaecef; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        
        /* 列表样式 */
        .info-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 12px 0; font-size: 14px; }
        .info-label { color: #707a8a; margin-top: 2px; }
        .info-val { color: #1e2329; text-align: right; }
        .info-val.mono { font-family: monospace; font-size: 15px; }

        /* Tabs */
        .sub-tab { font-size: 14px; font-weight: 500; color: #707a8a; cursor: pointer; padding-bottom: 8px; border-bottom: 2px solid transparent; }
        .sub-tab.active { color: #1e2329; border-bottom: 2px solid #1e2329; }

        /* 输入框 */
        .okx-input-box { background: #f5f5f5; border: 1px solid transparent; border-radius: 4px; display: flex; align-items: center; transition: 0.2s; }
        .okx-input-box:focus-within { border-color: #c9ccd2; background: #ffffff; }
        .okx-input { background: transparent; width: 100%; border: none; outline: none; padding: 10px 12px; font-size: 15px; color: #1e2329; font-family: monospace; font-weight: 500; }
        .okx-input:disabled { color: #b7bdc6; cursor: not-allowed; }
        
        /* 杠杆输入特调 */
        .lev-input { width: 45px; background: transparent; border: none; outline: none; text-align: right; font-weight: bold; font-size: 14px; color: #1e2329; font-family: monospace;}
        .lev-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        /* 滑块 */
        .slider-container { position: relative; padding: 10px 0 20px 0; }
        .slider-track { position: absolute; top: 16px; left: 0; right: 0; height: 2px; background: #eaecef; z-index: 1; }
        .slider-marks { display: flex; justify-content: space-between; position: absolute; top: 12px; left: 0; right: 0; z-index: 2; pointer-events: none; }
        .slider-mark { width: 10px; height: 10px; background: white; border: 2px solid #eaecef; border-radius: 50%; }
        .slider-labels { display: flex; justify-content: space-between; margin-top: 12px; font-size: 12px; color: #b7bdc6; font-family: monospace; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; position: relative; z-index: 3; cursor: pointer; margin: 0; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: white; border: 4px solid #1e2329; margin-top: -6px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 2px; background: transparent; }

        /* 按钮与数据列 */
        .btn-buy { background: #0ecb81; color: white; transition: 0.2s; }
        .btn-buy:hover { background: #0b9e65; }
        .btn-sell { background: #f6465d; color: white; transition: 0.2s; }
        .btn-sell:hover { background: #c9384b; }
        .cost-row { display: flex; justify-content: space-between; font-size: 12px; color: #707a8a; margin-top: 8px; }
        .cost-val { color: #1e2329; font-family: monospace; font-weight: 500;}
        
        .text-risk { color: #f6465d; font-weight: bold; } /* 强平价高亮红色 */
        
        input[type=number]::-webkit-inner-spin-button { opacity: 1; height: 30px; }
    </style>
</head>
<body class="p-4 md:p-8 flex justify-center items-start min-h-screen">

    <div class="w-full max-w-[900px] flex flex-col md:flex-row gap-6">
        
        <div class="w-full md:w-[420px] panel-bg p-6 flex flex-col shrink-0">
            <div class="mb-5 relative">
                <select id="instId" class="absolute inset-0 opacity-0 cursor-pointer w-full" onchange="switchPair()">
                    <option value="BTC-USDT-SWAP">BTC-USDT-SWAP</option>
                    <option value="ETH-USDT-SWAP">ETH-USDT-SWAP</option>
                    <option value="SOL-USDT-SWAP">SOL-USDT-SWAP</option>
                    <option value="DOGE-USDT-SWAP">DOGE-USDT-SWAP</option>
                </select>
                <div class="text-[24px] font-bold flex items-center gap-2 cursor-pointer hover:text-gray-600">
                    <span id="displayPairTitle">BTCUSDT 永续</span>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                </div>
            </div>

            <div class="flex-1 space-y-1">
                <div class="info-row"><span class="info-label">合约面值</span><span class="info-val" id="infoCtVal">0.01 BTC</span></div>
                <div class="info-row"><span class="info-label">最大杠杆</span><span class="info-val" id="infoLevRange">100x</span></div>
                
                <div class="info-row mt-6 pt-6 border-t border-gray-100">
                    <span class="info-label">实时最新价</span>
                    <span class="info-val mono font-bold text-[#0ecb81] text-xl" id="wsLastPrice">--</span>
                </div>
                
                <div class="info-row">
                    <span class="info-label">标记价格</span>
                    <span class="info-val mono font-bold" id="wsMarkPrice">--</span>
                </div>

                <div class="info-row bg-gray-50 p-3 rounded-lg mt-4 border border-gray-100">
                    <span class="info-label font-medium text-gray-700">当前资金费率</span>
                    <div class="text-right">
                        <div class="info-val mono font-bold text-lg" id="wsFundingRate">--</div>
                        <div class="text-[12px] font-bold mt-1" id="wsFundingDesc">拉取中...</div>
                        <div class="text-[10px] text-gray-400 mt-1">每 8 小时结算一次</div>
                    </div>
                </div>

                <div class="info-row mt-4"><span class="info-label">24 小时成交量</span><span class="info-val mono" id="wsVol24h">--</span></div>
            </div>
        </div>

        <div class="w-full md:w-[400px] panel-bg p-6 flex flex-col shrink-0">
            
            <div class="flex gap-3 mb-6">
                <button id="marginModeBtn" class="flex-1 bg-[#f5f5f5] hover:bg-[#eaecef] transition-colors rounded px-3 py-2.5 flex justify-center items-center gap-1 cursor-pointer text-sm font-bold text-[#1e2329] border border-transparent focus:border-[#c9ccd2]" onclick="toggleMarginMode()">
                    逐仓 <span class="text-[10px] text-gray-400">▼</span>
                </button>
                
                <div class="flex-1 bg-[#f5f5f5] rounded px-3 py-2.5 flex justify-center items-center gap-1 focus-within:bg-white focus-within:border-[#c9ccd2] border border-transparent transition-colors">
                    <input type="number" id="levInput" value="10" min="1" max="100" class="lev-input" oninput="manualLeverage()">
                    <span class="text-[#1e2329] font-bold text-sm">x</span>
                </div>
            </div>

            <div class="flex gap-6 mb-5 border-b border-gray-100">
                <div id="tabLimit" class="sub-tab active" onclick="setOrderType('limit')">限价测算</div>
                <div id="tabMarket" class="sub-tab" onclick="setOrderType('market')">市价测算</div>
            </div>

            <div class="text-[12px] text-[#707a8a] mb-1.5 font-medium">开仓价格 (USDT)</div>
            <div class="okx-input-box mb-4 h-[44px]">
                <input type="number" id="priceInput" class="okx-input" step="0.1" value="" oninput="userManualPrice()">
            </div>

            <div class="relative inline-block text-[12px] text-[#707a8a] mb-1.5 font-medium cursor-pointer hover:text-[#1e2329]" onclick="toggleUnitMenu()">
                开仓数量 (<span id="unitDisplay" class="font-bold underline decoration-dashed">USDT</span>) ▼
                <div id="unitMenu" class="hidden absolute top-full left-0 mt-1 bg-white border border-gray-200 shadow-lg rounded w-[100px] z-10 py-1">
                    <div class="px-3 py-2 hover:bg-gray-100 text-black text-sm" onclick="selectUnit('usdt', event)">USDT</div>
                    <div class="px-3 py-2 hover:bg-gray-100 text-black text-sm" onclick="selectUnit('ccy', event)" id="menuCcy">BTC</div>
                    <div class="px-3 py-2 hover:bg-gray-100 text-black text-sm" onclick="selectUnit('cont', event)">张</div>
                </div>
            </div>
            <div class="okx-input-box mb-2 h-[44px]">
                <input type="number" id="sizeInput" class="okx-input" placeholder="输入数量" oninput="manualSize()">
            </div>

            <div class="slider-container">
                <div class="slider-track"></div>
                <div class="slider-marks">
                    <div class="slider-mark"></div><div class="slider-mark"></div><div class="slider-mark"></div><div class="slider-mark"></div><div class="slider-mark"></div>
                </div>
                <input type="range" id="percentSlider" min="0" max="100" step="1" value="0" oninput="slidePercent()">
                <div class="slider-labels"><span>0%</span><span>25%</span><span>50%</span><span>75%</span><span>100%</span></div>
            </div>

            <div class="text-[13px] text-[#707a8a] mb-6 bg-gray-50 p-2 rounded">
                可用本金： <span id="availBalance" class="text-[#1e2329] font-mono font-bold cursor-pointer underline decoration-dashed underline-offset-4 text-[15px]" title="点击修改本金" onclick="promptBalance()">10,000.00 USDT</span>
            </div>

            <div class="flex gap-6 mt-2 border-t border-gray-100 pt-5">
                <div class="flex-1 bg-[#0ecb81]/5 p-3 rounded-lg border border-[#0ecb81]/20">
                    <div class="text-[#0ecb81] font-bold text-sm mb-3 text-center">做多 (Long) 测算</div>
                    <div class="cost-row"><span>总计成本</span><span class="cost-val" id="costLong">--</span></div>
                    <div class="cost-row"><span>预估强平价</span><span class="cost-val text-risk" id="liqLong">--</span></div>
                </div>
                <div class="flex-1 bg-[#f6465d]/5 p-3 rounded-lg border border-[#f6465d]/20">
                    <div class="text-[#f6465d] font-bold text-sm mb-3 text-center">做空 (Short) 测算</div>
                    <div class="cost-row"><span>总计成本</span><span class="cost-val" id="costShort">--</span></div>
                    <div class="cost-row"><span>预估强平价</span><span class="cost-val text-risk" id="liqShort">--</span></div>
                </div>
            </div>

            <div class="mt-6 pt-5 border-t border-gray-200">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[14px] font-bold text-[#1e2329]">手续费明细</span>
                    <select id="vipLevel" class="text-xs border border-gray-300 rounded px-2 py-1.5 outline-none bg-white cursor-pointer font-medium" onchange="calculate()">
                        <option value="Regular">普通用户</option><option value="VIP 1">VIP 1</option><option value="VIP 2">VIP 2</option>
                        <option value="VIP 3">VIP 3</option><option value="VIP 4">VIP 4</option><option value="VIP 5">VIP 5</option>
                    </select>
                </div>
                <div class="flex justify-between text-xs text-[#707a8a] mb-2">
                    <span>名义价值 (乘杠杆后)</span><span class="font-mono text-[#1e2329]" id="detailNotional">0.00 USDT</span>
                </div>
                <div class="flex justify-between text-xs text-[#707a8a]">
                    <span>单边手续费 (<span id="feeRateText">Maker 0.02%</span>)</span>
                    <span class="font-mono font-bold text-[#1e2329]" id="detailFee">0.00 USDT</span>
                </div>
            </div>

        </div>
    </div>

    <script>
        const INSTRUMENTS = {
            "BTC-USDT-SWAP": { baseCcy: "BTC", ctVal: 0.01, maxLev: 100 },
            "ETH-USDT-SWAP": { baseCcy: "ETH", ctVal: 0.1, maxLev: 100 },
            "SOL-USDT-SWAP": { baseCcy: "SOL", ctVal: 1, maxLev: 50 },
            "DOGE-USDT-SWAP": { baseCcy: "DOGE", ctVal: 1000, maxLev: 50 }
        };

        const FEES = {
            "Regular": { maker: 0.00020, taker: 0.00050 }, "VIP 1": { maker: 0.00010, taker: 0.00040 },
            "VIP 2": { maker: 0.00008, taker: 0.00035 }, "VIP 3": { maker: 0.00005, taker: 0.00030 },
            "VIP 4": { maker: 0.00000, taker: 0.00025 }, "VIP 5": { maker: -0.00002, taker: 0.00020 }
        };

        let state = {
            instId: "BTC-USDT-SWAP", 
            orderType: "limit", 
            marginMode: "isolated", // 'isolated' 逐仓 | 'cross' 全仓
            unit: "usdt", 
            lev: 10, 
            availBalance: 10000.00,
            isManualPrice: false, 
            lastPrice: 0
        };

        let ws = null;

        function initWebSocket() {
            if(ws) ws.close();
            ws = new WebSocket('wss://ws.okx.com:8443/ws/v5/public');
            ws.onopen = () => { 
                ws.send(JSON.stringify({ op: "subscribe", args: [
                    { channel: "tickers", instId: state.instId }, 
                    { channel: "mark-price", instId: state.instId },
                    { channel: "funding-rate", instId: state.instId }
                ]})); 
            };
            ws.onmessage = (event) => {
                if(event.data === 'pong') return;
                const res = JSON.parse(event.data);
                if (res.data && res.data[0]) {
                    if (res.arg.channel === 'tickers') handleTicker(res.data[0]);
                    if (res.arg.channel === 'mark-price') handleMarkPrice(res.data[0]);
                    if (res.arg.channel === 'funding-rate') handleFundingRate(res.data[0]);
                }
            };
        }

        function handleTicker(data) {
            state.lastPrice = parseFloat(data.last);
            document.getElementById('wsLastPrice').innerText = state.lastPrice.toFixed(5);
            document.getElementById('wsVol24h').innerText = parseFloat(data.volCcy24h).toLocaleString(undefined, {maximumFractionDigits: 2}) + ` ${INSTRUMENTS[state.instId].baseCcy}`;
            
            if (state.orderType === 'market') {
                calculate();
            } else if (!state.isManualPrice && document.getElementById('priceInput').value === "") {
                document.getElementById('priceInput').value = state.lastPrice;
            }
        }
        
        function handleMarkPrice(data) { document.getElementById('wsMarkPrice').innerText = "₮" + parseFloat(data.markPx).toFixed(5); }
        
        function handleFundingRate(data) {
            const rate = parseFloat(data.fundingRate);
            const rateEl = document.getElementById('wsFundingRate');
            const descEl = document.getElementById('wsFundingDesc');
            
            rateEl.innerText = (rate * 100).toFixed(4) + "%";
            
            if (rate > 0) {
                rateEl.style.color = '#0ecb81'; // 正费率通常标绿或默认色
                descEl.innerText = "➡️ 多仓支付空仓";
                descEl.style.color = '#0ecb81';
            } else if (rate < 0) {
                rateEl.style.color = '#f6465d'; 
                descEl.innerText = "⬅️ 空仓支付多仓";
                descEl.style.color = '#f6465d';
            } else {
                rateEl.style.color = '#1e2329';
                descEl.innerText = "费率为 0";
                descEl.style.color = '#707a8a';
            }
        }

        // --- 交互控制 ---

        function toggleMarginMode() {
            state.marginMode = state.marginMode === 'isolated' ? 'cross' : 'isolated';
            document.getElementById('marginModeBtn').innerHTML = `${state.marginMode === 'isolated' ? '逐仓' : '全仓'} <span class="text-[10px] text-gray-400">▼</span>`;
            calculate();
        }

        function manualLeverage() {
            const maxLev = INSTRUMENTS[state.instId].maxLev;
            let inputLev = parseInt(document.getElementById('levInput').value);
            
            // 限制输入范围 1 ~ Max
            if (isNaN(inputLev) || inputLev < 1) inputLev = 1;
            if (inputLev > maxLev) inputLev = maxLev;
            
            state.lev = inputLev;
            document.getElementById('levInput').value = state.lev;
            calculate();
        }

        function switchPair() {
            const oldId = state.instId;
            state.instId = document.getElementById('instId').value;
            const inst = INSTRUMENTS[state.instId];
            
            document.getElementById('displayPairTitle').innerText = state.instId.replace('-SWAP', ' 永续').replace('-', '');
            document.getElementById('infoCtVal').innerText = `${inst.ctVal.toLocaleString()} ${inst.baseCcy}`;
            document.getElementById('infoLevRange').innerText = `${inst.maxLev}x`;
            document.getElementById('menuCcy').innerText = inst.baseCcy;
            
            // 切换币对时，重置杠杆为默认 10，并修正输入框
            state.lev = 10;
            document.getElementById('levInput').value = 10;

            if(state.unit === 'ccy') document.getElementById('unitDisplay').innerText = inst.baseCcy;
            
            state.isManualPrice = false;
            if(state.orderType === 'limit') document.getElementById('priceInput').value = "";
            document.getElementById('sizeInput').value = "";
            document.getElementById('percentSlider').value = 0;

            if(ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ op: "unsubscribe", args: [{ channel: "tickers", instId: oldId }, { channel: "mark-price", instId: oldId }, { channel: "funding-rate", instId: oldId }] }));
                ws.send(JSON.stringify({ op: "subscribe", args: [{ channel: "tickers", instId: state.instId }, { channel: "mark-price", instId: state.instId }, { channel: "funding-rate", instId: state.instId }] }));
            }
            // 稍微延迟清空费率展示，等 WS 回调
            document.getElementById('wsFundingRate').innerText = "--";
            document.getElementById('wsFundingDesc').innerText = "拉取中...";
            
            calculate();
        }

        function setOrderType(type) {
            state.orderType = type;
            document.getElementById('tabLimit').className = `sub-tab ${type === 'limit' ? 'active' : ''}`;
            document.getElementById('tabMarket').className = `sub-tab ${type === 'market' ? 'active' : ''}`;
            
            const priceInput = document.getElementById('priceInput');
            if (type === 'market') {
                state.isManualPrice = false;
                priceInput.type = "text";
                priceInput.disabled = true;
                priceInput.value = "市价 (跟随行情)";
            } else {
                priceInput.type = "number";
                priceInput.disabled = false;
                priceInput.value = state.lastPrice > 0 ? state.lastPrice : "";
            }
            calculate();
        }

        function promptBalance() {
            const bal = prompt("输入模拟可用本金 (USDT) \n全仓模式下，此金额将直接影响强平价:", state.availBalance);
            if(bal !== null && !isNaN(parseFloat(bal)) && parseFloat(bal) > 0) {
                state.availBalance = parseFloat(bal);
                document.getElementById('availBalance').innerText = state.availBalance.toLocaleString(undefined, {minimumFractionDigits: 2}) + " USDT";
                calculate();
            }
        }

        function toggleUnitMenu() { document.getElementById('unitMenu').classList.toggle('hidden'); }
        function selectUnit(unit, e) {
            e.stopPropagation();
            state.unit = unit;
            const inst = INSTRUMENTS[state.instId];
            document.getElementById('unitDisplay').innerText = unit === 'usdt' ? 'USDT' : (unit === 'ccy' ? inst.baseCcy : '张');
            document.getElementById('unitMenu').classList.add('hidden');
            document.getElementById('sizeInput').value = "";
            document.getElementById('percentSlider').value = 0;
            calculate();
        }

        function userManualPrice() { state.isManualPrice = true; calculate(); }
        function manualSize() { document.getElementById('percentSlider').value = 0; calculate(); }

        function slidePercent() {
            const pct = parseInt(document.getElementById('percentSlider').value);
            const inst = INSTRUMENTS[state.instId];
            
            let calcPrice = state.orderType === 'market' ? state.lastPrice : (parseFloat(document.getElementById('priceInput').value) || state.lastPrice);
            if(calcPrice <= 0) return;

            const targetMargin = state.availBalance * (pct / 100);
            const level = document.getElementById('vipLevel').value;
            const feeRate = state.orderType === 'market' ? FEES[level].taker : FEES[level].maker;
            
            const maxNotional = targetMargin / ((1 / state.lev) + Math.max(0, feeRate));
            
            let val = 0;
            if (state.unit === 'usdt') { val = maxNotional; }
            else if (state.unit === 'ccy') { val = maxNotional / calcPrice; }
            else if (state.unit === 'cont') { val = Math.floor(maxNotional / (inst.ctVal * calcPrice)); }

            document.getElementById('sizeInput').value = val > 0 ? val.toFixed(state.unit==='cont'?0:4) : "";
            calculate();
        }

        // --- 核心算力引擎 (全仓/逐仓逻辑分化) ---

        function calculate() {
            const inst = INSTRUMENTS[state.instId];
            const level = document.getElementById('vipLevel').value;
            
            let calcPrice = state.orderType === 'market' ? state.lastPrice : (parseFloat(document.getElementById('priceInput').value) || state.lastPrice);
            let inputSize = parseFloat(document.getElementById('sizeInput').value) || 0;
            
            const feeRate = state.orderType === 'market' ? FEES[level].taker : FEES[level].maker;
            const feeTypeStr = state.orderType === 'market' ? 'Taker' : 'Maker';
            
            // 统一转化为币数 (Coins) 和 名义价值 (Notional)
            let coins = 0;
            let notional = 0;
            if(calcPrice > 0) {
                if (state.unit === 'usdt') { 
                    notional = inputSize; 
                    coins = notional / calcPrice; 
                }
                else if (state.unit === 'ccy') { 
                    coins = inputSize; 
                    notional = coins * calcPrice; 
                }
                else if (state.unit === 'cont') { 
                    coins = inputSize * inst.ctVal; 
                    notional = coins * calcPrice; 
                }
            }

            const fee = notional * feeRate;
            document.getElementById('detailNotional').innerText = notional.toFixed(2) + " USDT";
            document.getElementById('feeRateText').innerText = `${feeTypeStr} ${(feeRate * 100).toFixed(3)}%`;
            document.getElementById('detailFee').innerText = fee.toFixed(4) + " USDT";

            // 空白测算保护
            if (notional <= 0 || calcPrice <= 0 || coins <= 0) {
                document.getElementById('costLong').innerText = "-- USDT";
                document.getElementById('costShort').innerText = "-- USDT";
                document.getElementById('liqLong').innerText = "--";
                document.getElementById('liqShort').innerText = "--";
                return;
            }

            // 初始保证金与成本
            const margin = notional / state.lev;
            const cost = margin + fee;
            document.getElementById('costLong').innerText = cost.toFixed(2) + " USDT";
            document.getElementById('costShort').innerText = cost.toFixed(2) + " USDT";

            // ★ 核心强平逻辑分化 ★
            let liqLong = 0;
            let liqShort = 0;

            if (state.marginMode === 'isolated') {
                // 逐仓：只用这笔开仓的保证金抗跌 (亏完 margin 即爆仓，不考虑维持保证金率)
                liqLong = calcPrice * (1 - (margin - fee) / notional);
                liqShort = calcPrice * (1 + (margin - fee) / notional);
            } else {
                // 全仓：用整个账户的可用余额抗跌
                // 强平价 = 开仓价 ± (账户可用余额 / 持仓币数)
                // 扣除掉本次开仓的手续费损耗
                const effectiveBalance = state.availBalance - fee; 
                
                liqLong = calcPrice - (effectiveBalance / coins);
                liqShort = calcPrice + (effectiveBalance / coins);
                
                // 如果本金极大，多头强平价可能算出来是负数，实际代表“跌到 0 也不会爆仓”
                if (liqLong <= 0) liqLong = 0; 
            }

            document.getElementById('liqLong').innerText = liqLong > 0 ? liqLong.toFixed(5) : "安全 (0.00)";
            document.getElementById('liqShort').innerText = liqShort.toFixed(5);
        }

        document.addEventListener('click', (e) => {
            if(!e.target.closest('.inline-block')) document.getElementById('unitMenu').classList.add('hidden');
        });
        
        switchPair();
        initWebSocket();
    </script>
</body>
</html>
